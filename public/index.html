<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Tracker MEX — Popeye's</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Post Tracker MEX">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff;
    --ink: #111;
    --rule: #e8e8e8;
    --soft: #f8f8f8;
    --muted: #999;
    --muted2: #ccc;
    --green: #1e7a3a;
    --green-l: #edf7f1;
    --green-m: #2ecc71;
    --yellow: #9a6c00;
    --yellow-l: #fdf8e8;
    --yellow-m: #f1c40f;
    --orange: #b84e0e;
    --orange-l: #fef3ec;
    --orange-m: #e8a87c;
    --red: #c0392b;
    --red-l: #fef0ef;
    --blue: #2252b8;
    --blue-l: #eef2fc;
    --blue-m: #3498db;
    --purple: #6c3db8;
    --purple-l: #f3eeff;
    --blue-cal: #cce5ff;
    --orange-cal: #ffe5cc;
    --green-cal: #ccf0dd;
    --yellow-cal: #fff9cc;
    --pink-cal: #ffd6d6;
    --gray-cal: #e8e8e8;
  }

  html, body { background: #fff; margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  body { color: var(--ink); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  header { background: #fff; border-bottom: 2px solid var(--ink); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 4px; cursor: pointer; }
  .logo em { font-style: normal; font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-left: 8px; font-weight: 400; }

  /* BTN */
  .btn { font-size: 11px; padding: 6px 14px; border: 1px solid var(--rule); background: none; color: var(--muted); cursor: pointer; transition: all .15s; font-family: 'Inter', sans-serif; }
  .btn:hover { border-color: var(--ink); color: var(--ink); }
  .btn.ink { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.ink:hover { background: #333; }
  .btn.sm { font-size: 10px; padding: 4px 10px; }
  .btn.danger { border-color: #f5c0bc; color: var(--red); }
  .btn.danger:hover { background: var(--red-l); border-color: var(--red); }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* BOARD */
  .wrap { max-width: 860px; margin: 0 auto; padding: 20px 24px; }
  .board-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .sec-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

  .status-group { margin-bottom: 20px; }
  .group-lbl { display: flex; align-items: center; gap: 8px; padding-bottom: 7px; border-bottom: 1px solid var(--rule); margin-bottom: 7px; }
  .gdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .gname { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .gcnt { font-size: 11px; color: var(--muted2); margin-left: auto; }

  .proj-row { display: flex; align-items: center; padding: 12px 14px; background: #fff; border: 1px solid var(--rule); margin-bottom: 4px; cursor: pointer; transition: all .15s; gap: 12px; }
  .proj-row:hover { border-color: var(--ink); box-shadow: 0 1px 6px rgba(0,0,0,.06); }
  .proj-info { flex: 1; min-width: 0; }
  .proj-client { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proj-dir { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .proj-piezas { font-size: 11px; color: var(--muted2); white-space: nowrap; flex-shrink: 0; }
  .proj-date { font-size: 12px; white-space: nowrap; flex-shrink: 0; font-weight: 500; min-width: 56px; text-align: right; }
  .proj-date.soon { color: var(--yellow); }
  .proj-date.urgent { color: var(--red); }
  .proj-date.ok { color: var(--green); }
  .proj-date.normal { color: var(--muted); font-weight: 400; }
  .proj-arrow { color: var(--muted2); font-size: 16px; flex-shrink: 0; transition: transform .15s; }
  .proj-row:hover .proj-arrow { transform: translateX(2px); color: var(--ink); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border: 1px solid var(--rule); padding: 22px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--rule); }
  .form-field { margin-bottom: 12px; }
  .form-lbl { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; display: block; }
  .form-input, .form-select { width: 100%; border: 1px solid var(--rule); background: #fff; font-family: 'Inter', sans-serif; font-size: 13px; padding: 8px 11px; outline: none; color: var(--ink); transition: border-color .15s; }
  .form-input:focus, .form-select:focus { border-color: var(--ink); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--rule); }
  .modal-actions .btn { flex: 1; padding: 9px; font-size: 11px; text-align: center; }

  /* PIEZA MODAL */
  #piezaModal .modal { max-width: 400px; }

  /* DETAIL */
  .bc { font-size: 12px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .bc-link { cursor: pointer; } .bc-link:hover { color: var(--ink); }
  .bc-sep { color: var(--muted2); }
  .bc-cur { color: var(--ink); font-weight: 500; }

  .ptitle-block { padding-bottom: 14px; margin-bottom: 16px; border-bottom: 2px solid var(--ink); }
  .ptitle-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 8px; }
  .ptitle-client { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; line-height: 1; }
  .ptitle-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .ptitle-meta { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0; }
  .m-tag { font-size: 10px; padding: 4px 9px; border: 1px solid var(--rule); color: var(--muted); white-space: nowrap; }
  .m-tag.post { background: var(--orange-l); color: var(--orange); border-color: #f5c8a8; }
  .m-tag.soon { background: var(--yellow-l); color: var(--yellow); border-color: #f0dc80; }
  .ptitle-bottom { display: flex; gap: 18px; flex-wrap: wrap; }
  .pstat { font-size: 12px; color: var(--muted); }
  .pstat b { color: var(--ink); font-weight: 500; }

  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid var(--rule); margin-bottom: 16px; overflow-x: auto; }
  .tab { font-size: 12px; padding: 9px 16px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: all .15s; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); font-weight: 600; border-bottom-color: var(--ink); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* PIEZAS */
  .ph { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .empty-piezas { text-align: center; padding: 40px 20px; border: 1px dashed var(--rule); color: var(--muted); }
  .empty-piezas p { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

  .piece-card { border: 1px solid var(--rule); background: #fff; margin-bottom: 4px; overflow: hidden; }
  .piece-sum { display: flex; align-items: center; padding: 11px 14px; cursor: pointer; gap: 12px; transition: background .1s; user-select: none; }
  .piece-sum:hover, .piece-sum.open { background: var(--soft); }
  .piece-sum.open { border-bottom: 1px solid var(--rule); }
  .p-left { flex: 1; min-width: 0; }
  .p-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-dur { font-size: 11px; color: var(--muted); }
  .fmt-dots { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
  .fdot { width: 8px; height: 8px; border-radius: 50%; background: var(--rule); flex-shrink: 0; }
  .fdot.done { background: var(--green-m); }
  .fdot.wip { background: var(--yellow-m); }
  .fdot.rev { background: var(--blue-m); }
  .fdot.adj { background: var(--orange-m); }
  .p-date { font-size: 11px; min-width: 54px; text-align: right; font-weight: 500; flex-shrink: 0; }
  .p-date.soon { color: var(--yellow); }
  .p-date.urgent { color: var(--red); }
  .p-date.ok { color: var(--green); }
  .p-date.normal { color: var(--muted); font-weight: 400; }
  .p-chev { color: var(--muted2); font-size: 16px; transition: transform .2s; flex-shrink: 0; }
  .p-chev.open { transform: rotate(90deg); }
  .p-detail { display: none; padding: 14px; background: var(--soft); }
  .p-detail.open { display: block; }
  .dl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; margin-top: 12px; }
  .dl:first-child { margin-top: 0; }

  .fmt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .fmt-item { background: #fff; border: 1px solid var(--rule); padding: 8px 5px; text-align: center; cursor: pointer; transition: all .15s; }
  .fmt-item:hover { border-color: #aaa; }
  .fmt-item.done { background: var(--green-l); border-color: #a8ddb8; }
  .fmt-item.wip { background: var(--yellow-l); border-color: #e8d060; }
  .fmt-item.rev { background: var(--blue-l); border-color: #90b0f0; }
  .fmt-item.adj { background: var(--orange-l); border-color: #f5c8a8; }
  .fmt-ratio { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 3px; }
  .fmt-item.done .fmt-ratio { color: var(--green); }
  .fmt-item.wip .fmt-ratio { color: var(--yellow); }
  .fmt-item.rev .fmt-ratio { color: var(--blue); }
  .fmt-item.adj .fmt-ratio { color: var(--orange); }
  .fmt-st { font-size: 9px; color: var(--muted2); }
  .fmt-item.done .fmt-st { color: var(--green); }
  .fmt-item.wip .fmt-st { color: var(--yellow); }
  .fmt-item.rev .fmt-st { color: var(--blue); }
  .fmt-item.adj .fmt-st { color: var(--orange); }

  .vo-box { display: inline-flex; align-items: center; gap: 7px; background: #fff; border: 1px solid var(--rule); padding: 7px 12px; cursor: pointer; transition: all .15s; }
  .vo-box:hover { border-color: #aaa; }
  .vo-box.on { background: var(--green-l); border-color: #a8ddb8; }
  .vo-chk { width: 15px; height: 15px; border: 1.5px solid var(--muted2); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
  .vo-box.on .vo-chk { background: var(--green); border-color: var(--green); color: #fff; }
  .vo-lbl { font-size: 11px; color: var(--muted); }
  .vo-box.on .vo-lbl { color: var(--green); font-weight: 500; }

  .txt-input { width: 100%; border: 1px solid var(--rule); background: #fff; font-family: 'Inter', sans-serif; font-size: 12px; padding: 8px 11px; outline: none; color: var(--ink); resize: none; line-height: 1.5; transition: border-color .15s; }
  .txt-input:focus { border-color: var(--ink); }
  .txt-input::placeholder { color: var(--muted2); }

  .piece-actions { display: flex; justify-content: flex-end; margin-top: 10px; }

  /* OFFLINE / ONLINE */
  .ESTADO_OPTS = ['—','En curso','Rev Agencia','Ajustes','Rev Cliente','Aprobado']; */
  .stage-status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .sst-item { background: #fff; border: 1px solid var(--rule); padding: 10px 12px; cursor: pointer; transition: all .15s; user-select: none; }
  .sst-item:hover { border-color: #aaa; }
  .sst-item.en-curso { background: var(--yellow-l); border-color: #e8d060; }
  .sst-item.rev-agencia { background: var(--blue-l); border-color: #90b0f0; }
  .sst-item.ajustes { background: var(--orange-l); border-color: #f5c8a8; }
  .sst-item.rev-cliente { background: var(--purple-l); border-color: #c8a8f0; }
  .sst-item.aprobado { background: var(--green-l); border-color: #a8ddb8; }
  .sst-name { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .sst-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--rule); margin-bottom: 5px; }
  .sst-item.en-curso .sst-dot { background: var(--yellow-m); }
  .sst-item.rev-agencia .sst-dot { background: var(--blue-m); }
  .sst-item.ajustes .sst-dot { background: var(--orange-m); }
  .sst-item.rev-cliente .sst-dot { background: #9b59b6; }
  .sst-item.aprobado .sst-dot { background: var(--green-m); }
  .sst-label { font-size: 9px; color: var(--muted2); }
  .sst-item.en-curso .sst-label { color: var(--yellow); }
  .sst-item.rev-agencia .sst-label { color: var(--blue); }
  .sst-item.ajustes .sst-label { color: var(--orange); }
  .sst-item.rev-cliente .sst-label { color: #9b59b6; }
  .sst-item.aprobado .sst-label { color: var(--green); }

  .estado-wrap { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--rule); padding: 8px 12px; }
  .estado-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--rule); flex-shrink: 0; }
  .estado-sel { border: none; background: none; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--ink); outline: none; cursor: pointer; flex: 1; }

  /* ══════════════════════════════════════
     TIMING — CALENDARIO SEMANAL
  ══════════════════════════════════════ */
  .cal-wrap { overflow-x: auto; border: 1px solid var(--rule); }
  .cal-header-row { display: flex; align-items: stretch; border-bottom: 2px solid var(--ink); }
  .cal-corner { min-width: 80px; max-width: 80px; background: var(--ink); display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 8px 6px; flex-shrink: 0; }
  .cal-corner-name { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 2px; color: #fff; }
  .cal-corner-sub { font-size: 8px; color: #888; letter-spacing: 1px; margin-top: 2px; }
  .cal-day-header { flex: 1; text-align: center; padding: 6px 4px; border-left: 1px solid var(--rule); background: var(--soft); }
  .cal-day-name { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .cal-day-header.wk { background: #f4f4f4; }
  .cal-day-header.wk .cal-day-name { color: var(--muted2); }

  .cal-week { display: flex; border-bottom: 1px solid var(--rule); min-height: 80px; }
  .cal-week:last-child { border-bottom: none; }
  .cal-week-label { min-width: 80px; max-width: 80px; background: var(--soft); border-right: 2px solid var(--rule); padding: 8px 6px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: flex-start; }
  .cal-week-dates { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 3px; }
  .cal-week-num { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--muted2); }

  .cal-day-cell { flex: 1; border-left: 1px solid var(--rule); padding: 4px; min-height: 80px; vertical-align: top; position: relative; }
  .cal-day-cell.wk { background: #fafafa; }
  .cal-day-cell.today { background: #fffbf0; }
  .cal-day-num { font-size: 9px; color: var(--muted2); margin-bottom: 3px; text-align: right; }

  /* EVENTOS EN EL CALENDARIO */
  .cal-event { border-radius: 2px; padding: 3px 5px; margin-bottom: 2px; font-size: 9px; line-height: 1.3; font-weight: 500; }
  .cal-event.shoot { background: #111; color: #fff; }
  .cal-event.edit { background: var(--blue-cal); color: #1a3a6a; }
  .cal-event.cc { background: var(--orange-cal); color: #7a3a10; }
  .cal-event.audio { background: var(--green-cal); color: #1a5a2a; }
  .cal-event.online { background: var(--purple-l); color: #4a1a8a; }
  .cal-event.rev { background: var(--yellow-cal); color: #7a5a00; }
  .cal-event.entrega { background: #111; color: #e8ff47; }
  .cal-event.aprobacion { background: var(--green-cal); color: #1a5a2a; font-weight: 700; }
  .cal-event.feriado { background: var(--yellow-m); color: #7a5a00; }
  .cal-event.musical { background: #e8d6ff; color: #4a1a8a; }
  .cal-event.foto { background: #ffd6f0; color: #7a1a5a; }
  .cal-event.ppm { background: #d6f0ff; color: #1a5a7a; }
  .cal-event.ensayo { background: #d6ffe8; color: #1a5a3a; }
  .cal-event.backs { background: #f0d6ff; color: #5a1a8a; }

  /* CAL LEGEND */
  .cal-legend { display: flex; gap: 10px; flex-wrap: wrap; padding: 8px 10px; border: 1px solid var(--rule); border-top: none; background: #fff; }
  .cal-li { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--muted); }
  .cal-ld { width: 12px; height: 8px; border-radius: 2px; }

  /* DAY BY DAY */
  .dbd-sec { display: flex; flex-direction: column; gap: 14px; }
  .dbd-bh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .f-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 0; }
  .fi { background: #fff; border: 1px solid var(--rule); padding: 8px 9px; cursor: pointer; }
  .fi:hover { border-color: #aaa; }
  .fi.ag { border-left: 3px solid var(--blue-m); }
  .fi.cl { border-left: 3px solid var(--orange-m); }
  .fi.ap { border-left: 3px solid var(--green-m); }
  .fi-tipo { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .fi.ag .fi-tipo { color: var(--blue); }
  .fi.cl .fi-tipo { color: var(--orange); }
  .fi.ap .fi-tipo { color: var(--green); }
  .fi-val { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .fi-nota { font-size: 10px; color: var(--muted); }

  .dbd-list { display: flex; flex-direction: column; gap: 4px; }
  .dbd-day { background: #fff; border: 1px solid var(--rule); overflow: hidden; }
  .dbd-dh { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--soft); border-bottom: 1px solid var(--rule); gap: 8px; }
  .dbd-date { font-size: 12px; font-weight: 600; }
  .dbd-entries { }
  .dbd-entry { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border-bottom: 1px solid var(--rule); }
  .dbd-entry:last-child { border-bottom: none; }
  .dbd-entry:hover { background: var(--soft); }
  .dbd-entry.hl-ag { border-left: 3px solid var(--blue-m); }
  .dbd-entry.hl-cl { border-left: 3px solid var(--orange-m); }
  .dbd-entry.hl-ap { border-left: 3px solid var(--green-m); }
  .dbd-time-input { border: none; border-bottom: 1px solid var(--rule); background: none; font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); outline: none; width: 50px; padding: 1px 2px; flex-shrink: 0; }
  .dbd-info { flex: 1; }
  .dbd-title-input { width: 100%; border: none; border-bottom: 1px solid var(--rule); background: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; outline: none; color: var(--ink); padding: 1px 0; margin-bottom: 4px; }
  .dbd-note-input { width: 100%; border: none; border-bottom: 1px solid var(--rule); background: none; font-family: 'Inter', sans-serif; font-size: 11px; outline: none; color: var(--muted); padding: 1px 0; }
  .dbd-tag { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border: 1px solid; white-space: nowrap; align-self: flex-start; margin-top: 3px; flex-shrink: 0; }
  .dbd-tag.shoot { border-color: #111; color: #111; }
  .dbd-tag.edit { border-color: #b0c8f0; color: var(--blue); }
  .dbd-tag.cc { border-color: #f5c8a8; color: var(--orange); }
  .dbd-tag.audio { border-color: #a8ddb8; color: var(--green); }
  .dbd-tag.online { border-color: #c8a8f0; color: var(--purple); }
  .dbd-tag.entrega { border-color: var(--ink); color: var(--ink); }
  .dbd-tag.agencia { border-color: #b0c8f0; color: var(--blue); }
  .dbd-tag.cliente { border-color: #f5c8a8; color: var(--orange); }
  .dbd-tag.aprobacion { border-color: #a8ddb8; color: var(--green); }

  /* SYNC */

function renderBoard() {
  const groups = { pre:[], prod:[], post:[], done:[] };
  projects.forEach(p => groups[p.estado].push(p));
  const meta = {
    post:{ name:'Post-producción', color:'#e8a87c' },
    prod:{ name:'Producción', color:'#f1c40f' },
    pre: { name:'Pre-producción', color:'#3498db' },
    done:{ name:'Entregado', color:'#2ecc71' }
  };
  let html = '';
  ['post','prod','pre','done'].forEach(s => {
    if (!groups[s].length) return;
    html += `<div class="status-group"><div class="group-lbl"><div class="gdot" style="background:${meta[s].color}"></div><div class="gname">${meta[s].name}</div><div class="gcnt">${groups[s].length}</div></div>`;
    groups[s].forEach(p => {
      const cnt = p.piezas.length;
      html += `<div class="proj-row" onclick="showDetail(${p.id})">
        <div class="proj-info"><div class="proj-client">${p.cliente}</div><div class="proj-dir">${p.director}</div></div>
        <div class="proj-piezas">${cnt} pieza${cnt!==1?'s':''}</div>
        <div class="proj-date soon">${p.entrega}</div>
        <div class="proj-arrow">›</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('boardContent').innerHTML = html || '<div style="padding:40px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase">Sin proyectos — agregá uno</div>';
}

// ── DETAIL ──
function showDetail(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  currentProjectId = id;
  document.getElementById('bc-name').textContent = p.cliente;
  document.getElementById('d-client').textContent = p.cliente;
  document.getElementById('d-sub').textContent = `${p.nombre} · ${p.director}`;
  document.getElementById('d-rodaje').textContent = p.rodaje;
  document.getElementById('d-piezas').textContent = `${p.piezas.length}`;
  document.getElementById('d-entrega').textContent = p.entrega;
  document.getElementById('d-meta').innerHTML = `<span class="m-tag post">Post-producción</span><span class="m-tag soon">Entrega: ${p.entrega}</span>`;
  loadDBD();
  renderPiezas(p);
  renderOffline(p);
  renderOnline(p);
  renderTiming();
  renderFechas();
  renderDBD();
  switchTab('piezas', document.querySelector('.tab'));
  showView('detailView');
}

function getCurrentProject() { return projects.find(x => x.id === currentProjectId); }

// ── PIEZAS ──
function renderPiezas(p) {
  const list = document.getElementById('piezasList');
  if (!p.piezas.length) {
    list.innerHTML = `<div class="empty-piezas">
      <p>Sin piezas — agregá la primera</p>
      <button class="btn ink sm" onclick="openModal('pieza')">+ Agregar pieza</button>
    </div>`;
    return;
  }
  list.innerHTML = p.piezas.map((pieza, i) => {
    const d = getPiezaData(p.id, pieza.id);
    const dots = ['16:9','4:5','1:1','9:16'].map(f => `<div class="fdot ${fmtCls(d.formatos[f])}"></div>`).join('');
    return `<div class="piece-card" id="pc-${pieza.id}">
      <div class="piece-sum${i===0?' open':''}" onclick="togglePiece(this)">
        <div class="p-left"><div class="p-name">${pieza.nombre}</div><div class="p-dur">${pieza.dur}</div></div>
        <div class="fmt-dots">${dots}</div>
        <div class="p-date normal">${pieza.fecha||'—'}</div>
        <div class="p-chev${i===0?' open':''}">›</div>
      </div>
      <div class="p-detail${i===0?' open':''}">
        <div class="dl">Formatos</div>
        <div class="fmt-grid">
          ${['16:9','4:5','1:1','9:16'].map(f => {
            const cls = fmtCls(d.formatos[f]);
            return `<div class="fmt-item ${cls}" onclick="cycleFmt(this,'${f}',${pieza.id})">
              <div class="fmt-ratio">${f}</div>
              <div class="fmt-st">${d.formatos[f]||'—'}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="dl">Locutor (VO)</div>
        <div class="vo-box${d.vo?' on':''}" onclick="toggleVO(this,${pieza.id})">
          <div class="vo-chk">${d.vo?'✓':''}</div>
          <div class="vo-lbl">Incluye locutor</div>
        </div>
        <div class="dl">Guión</div>
        <input class="txt-input" type="text" value="${d.guion||''}" placeholder="Link al guión..." onchange="getPiezaData(${p.id},${pieza.id}).guion=this.value; savePiezaData()">
        <div class="dl">Comentarios</div>
        <textarea class="txt-input" style="min-height:48px" placeholder="Comentarios..." onchange="getPiezaData(${p.id},${pieza.id}).comment=this.value; savePiezaData()">${d.comment||''}</textarea>
        <div class="piece-actions">
          <button class="btn sm danger" onclick="deletePieza(${pieza.id})">Eliminar pieza</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function fmtCls(val) {
  if (val==='Aprobado') return 'done';
  if (val==='En curso') return 'wip';
  if (val==='Rev') return 'rev';
  if (val==='Ajustes') return 'adj';
  return '';
}

function cycleFmt(el, fmt, piezaId) {
  const p = getCurrentProject(); if (!p) return;
  const d = getPiezaData(p.id, piezaId);
  const cur = FMT_CYCLE.findIndex(f => f.cls && el.classList.contains(f.cls));
  const next = FMT_CYCLE[(cur===-1?0:cur+1)%FMT_CYCLE.length];
  FMT_CYCLE.forEach(f => { if(f.cls) el.classList.remove(f.cls); });
  if (next.cls) el.classList.add(next.cls);
  el.querySelector('.fmt-st').textContent = next.lbl;
  d.formatos[fmt] = next.lbl;
  savePiezaData();
  const card = document.getElementById('pc-'+piezaId);
  if (card) {
    const dots = card.querySelectorAll('.fdot');
    ['16:9','4:5','1:1','9:16'].forEach((f,i) => { dots[i].className = 'fdot ' + fmtCls(d.formatos[f]); });
  }
}

function toggleVO(el, piezaId) {
  const p = getCurrentProject(); if (!p) return;
  el.classList.toggle('on');
  const on = el.classList.contains('on');
  el.querySelector('.vo-chk').textContent = on ? '✓' : '';
  getPiezaData(p.id, piezaId).vo = on;
  savePiezaData();
}

function togglePiece(sum) {
  const det = sum.nextElementSibling;
  const chev = sum.querySelector('.p-chev');
  const open = det.classList.contains('open');
  det.classList.toggle('open', !open);
  sum.classList.toggle('open', !open);
  chev.classList.toggle('open', !open);
}

function deletePieza(piezaId) {
  const p = getCurrentProject(); if (!p) return;
  if (!confirm('¿Eliminar esta pieza?')) return;
  p.piezas = p.piezas.filter(x => x.id !== piezaId);
  document.getElementById('d-piezas').textContent = p.piezas.length;
  saveProjects();
  renderPiezas(p);
  renderOffline(p);
  renderOnline(p);
}

// ── OFFLINE / ONLINE ──
function renderStageTab(containerId, stages, dataKey, stateKey, p) {
  if (!p.piezas.length) {
    document.getElementById(containerId).innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase">Sin piezas — agregá piezas en el tab Piezas</div>';
    return;
  }
  document.getElementById(containerId).innerHTML = p.piezas.map((pieza, i) => {
    const d = getPiezaData(p.id, pieza.id);
    const est = d[stateKey];
    return `<div class="piece-card" id="${dataKey}-pc-${pieza.id}">
      <div class="piece-sum${i===0?' open':''}" onclick="togglePiece(this)">
        <div class="p-left"><div class="p-name">${pieza.nombre}</div><div class="p-dur">${pieza.dur}</div></div>
        <div class="p-date normal" style="min-width:100px;font-size:10px;color:${estColor(est)}">${est}</div>
        <div class="p-chev${i===0?' open':''}">›</div>
      </div>
      <div class="p-detail${i===0?' open':''}">
        <div class="dl">Estado general</div>
        <div class="estado-wrap" id="${dataKey}-ew-${pieza.id}">
          <div class="estado-dot" style="background:${estColor(est)}"></div>
          <select class="estado-sel" onchange="setEstado(this,'${stateKey}',${pieza.id},'${dataKey}',${p.id})">
            ${ESTADO_OPTS.map(o => `<option${o===est?' selected':''}>${o}</option>`).join('')}
          </select>
        </div>
        <div class="dl">Etapas — click para cambiar</div>
        <div class="stage-status-grid">
          ${stages.map(s => {
            const sv = d[dataKey+'Stages'][s]||'—';
            const sc = ESTADO_CLS[sv]||'';
            return `<div class="sst-item ${sc}" onclick="cycleEstado(this,'${dataKey}Stages','${s}',${pieza.id},${p.id})">
              <div class="sst-name">${s}</div>
              <div class="sst-dot"></div>
              <div class="sst-label">${sv}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="dl">Comentarios</div>
        <textarea class="txt-input" style="min-height:48px" placeholder="Notas de ${dataKey}..." onchange="getPiezaData(${p.id},${pieza.id}).${dataKey}Comment=this.value; savePiezaData()">${d[dataKey+'Comment']||''}</textarea>
      </div>
    </div>`;
  }).join('');
}

function renderOffline(p) { renderStageTab('offlineList', OFFLINE_STAGES, 'offline', 'offlineEstado', p||getCurrentProject()); }
function renderOnline(p)  { renderStageTab('onlineList',  ONLINE_STAGES,  'online',  'onlineEstado',  p||getCurrentProject()); }

function estColor(est) {
  return { 'En curso':'#f1c40f','Rev Agencia':'#3498db','Ajustes':'#e8a87c','Rev Cliente':'#9b59b6','Aprobado':'#2ecc71' }[est]||'#ccc';
}

function setEstado(sel, stateKey, piezaId, prefix, projId) {
  const val = sel.value;
  getPiezaData(projId, piezaId)[stateKey] = val;
  savePiezaData();
  const ew = document.getElementById(`${prefix}-ew-${piezaId}`);
  if (ew) { const dot = ew.querySelector('.estado-dot'); if(dot) dot.style.background = estColor(val); }
}

function cycleEstado(el, dataKey, stage, piezaId, projId) {
  const d = getPiezaData(projId, piezaId);
  if (!d[dataKey]) d[dataKey] = {};
  const cur = ESTADO_OPTS.indexOf(d[dataKey][stage]||'—');
  const next = ESTADO_OPTS[(cur+1)%ESTADO_OPTS.length];
  Object.values(ESTADO_CLS).forEach(c => { if(c) el.classList.remove(c); });
  const nc = ESTADO_CLS[next]||'';
  if (nc) el.classList.add(nc);
  el.querySelector('.sst-label').textContent = next;
  d[dataKey][stage] = next;
  savePiezaData();
}

// ── TIMING DATA: keyed by project id ──
const TIMING_BY_PROJECT = { 1: TIMING_WEEKS };

// ── TIMING — CALENDARIO SEMANAL ──
function renderTiming() {
  const weeks = TIMING_BY_PROJECT[currentProjectId];
  if (!weeks || !weeks.length) {
    document.getElementById('calWrap').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase">Sin timing — enviá el calendario a Mariano para cargarlo</div>';
    return;
  }

  const days = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];
  let html = `<div class="cal-header-row">
    <div class="cal-corner"><div class="cal-corner-name">LAUTARO</div><div class="cal-corner-sub">FURIOLO</div></div>
    ${days.map((d,i) => `<div class="cal-day-header${i>=5?' wk':''}"><div class="cal-day-name">${d}</div></div>`).join('')}
  </div>`;

  weeks.forEach(week => {
    html += `<div class="cal-week">
      <div class="cal-week-label">
        <div class="cal-week-dates">${week.dates}</div>
      </div>
      ${week.days.map(day => `
        <div class="cal-day-cell${day.wk?' wk':''}">
          <div class="cal-day-num">${day.n}</div>
          ${day.events.map(e => `<div class="cal-event ${e.type}">${e.text}</div>`).join('')}
        </div>
      `).join('')}
    </div>`;
  });

  html += `</div>
  <div class="cal-legend">
    <div class="cal-li"><div class="cal-ld" style="background:#111;color:#fff"></div>Shoot</div>
    <div class="cal-li"><div class="cal-ld" style="background:var(--blue-cal)"></div>Edición</div>
    <div class="cal-li"><div class="cal-ld" style="background:var(--orange-cal)"></div>CC</div>
    <div class="cal-li"><div class="cal-ld" style="background:var(--green-cal)"></div>Audio</div>
    <div class="cal-li"><div class="cal-ld" style="background:var(--purple-l)"></div>Online</div>
    <div class="cal-li"><div class="cal-ld" style="background:var(--yellow-cal)"></div>Revisión</div>
    <div class="cal-li"><div class="cal-ld" style="background:#111"></div>Entrega</div>
    <div class="cal-li"><div class="cal-ld" style="background:var(--green-cal)"></div>Aprobación</div>
    <div class="cal-li"><div class="cal-ld" style="background:var(--yellow-m)"></div>Feriado</div>
  </div>`;

  document.getElementById('calWrap').innerHTML = html;
}

// ── DAY BY DAY ──
function renderFechas() {
  const defaults = DBD_BY_PROJECT[currentProjectId];
  if (!defaults) {
    document.getElementById('fechasGrid').innerHTML = '<div style="padding:20px 0;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase">Sin fechas — se cargan junto con el timing</div>';
    return;
  }
  document.getElementById('fechasGrid').innerHTML = defaults.fechas.map(f =>
    `<div class="fi ${f.cls}"><div class="fi-tipo">${f.tipo}</div><div class="fi-val">${f.val}</div><div class="fi-nota">${f.nota}</div></div>`
  ).join('');
}

function renderDBD() {
  if (!DBD_BY_PROJECT[currentProjectId] && !dbdData.length) {
    document.getElementById('dbdList').innerHTML = '<div style="padding:20px 0;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase">Sin agenda — se carga junto con el timing</div>';
    return;
  }
  document.getElementById('dbdList').innerHTML = dbdData.map(day => `
    <div class="dbd-day" id="day-${day.id}">
      <div class="dbd-dh">
        <div class="dbd-date">${day.date}${day.label?` · <span style="color:${dayLabelColor(day.label)};font-weight:600">${day.label}</span>`:''}</div>
        <div style="display:flex;gap:5px">
          <button class="btn sm" onclick="addEntry('${day.id}')">+ Entrada</button>
          <button class="btn sm danger" onclick="deleteDay('${day.id}')">✕</button>
        </div>
      </div>
      <div class="dbd-entries" id="entries-${day.id}">
        ${day.entries.map(e => renderEntry(e, day.id)).join('')}
      </div>
    </div>
  `).join('');
}

function renderEntry(e, dayId) {
  return `<div class="dbd-entry${e.hl?' '+e.hl:''}" id="entry-${e.id}">
    <input class="dbd-time-input" value="${e.time}" onchange="updateEntry('${dayId}','${e.id}','time',this.value)" placeholder="Hora">
    <div class="dbd-info">
      <input class="dbd-title-input" value="${e.title}" onchange="updateEntry('${dayId}','${e.id}','title',this.value)" placeholder="Título...">
      <input class="dbd-note-input" value="${e.note}" onchange="updateEntry('${dayId}','${e.id}','note',this.value)" placeholder="Nota...">
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
      <span class="dbd-tag ${e.tag}">${e.tag}</span>
      <button class="btn sm danger" style="font-size:9px;padding:2px 6px" onclick="deleteEntry('${dayId}','${e.id}')">✕</button>
    </div>
  </div>`;
}

function dayLabelColor(lbl) {
  if (/aprobaci[oó]n|entrega/i.test(lbl)) return 'var(--green)';
  if (/cliente/i.test(lbl)) return 'var(--orange)';
  if (/agencia|ppm/i.test(lbl)) return 'var(--blue)';
  return 'var(--muted)';
}

function addDia() {
  const date = prompt('Fecha (ej. "Lun 5 May"):'); if (!date) return;
  const label = prompt('Etiqueta (opcional):') || '';
  dbdData.push({ id:'d'+Date.now(), date, label, entries:[] });
  saveDBD(); renderDBD();
}

function deleteDay(dayId) {
  if (!confirm('¿Eliminar este día?')) return;
  dbdData = dbdData.filter(d => d.id !== dayId);
  saveDBD(); renderDBD();
}

function addEntry(dayId) {
  const day = dbdData.find(d => d.id === dayId); if (!day) return;
  const time = prompt('Horario (ej. "10:00"):') || '';
  const title = prompt('Título:'); if (!title) return;
  const note = prompt('Nota (opcional):') || '';
  const tags = 'shoot / edit / cc / audio / online / entrega / agencia / cliente / aprobacion';
  const tag = prompt(`Tag (${tags}):`) || 'edit';
  day.entries.push({ id:'e'+Date.now(), time, title, note, tag, hl:'' });
  saveDBD(); renderDBD();
}

function deleteEntry(dayId, entryId) {
  const day = dbdData.find(d => d.id === dayId); if (!day) return;
  day.entries = day.entries.filter(e => e.id !== entryId);
  saveDBD(); renderDBD();
}

let saveTimer = null;
function updateEntry(dayId, entryId, field, value) {
  const day = dbdData.find(d => d.id === dayId); if (!day) return;
  const entry = day.entries.find(e => e.id === entryId);
  if (entry) { entry[field] = value; clearTimeout(saveTimer); saveTimer = setTimeout(saveDBD, 1500); }
}

function saveDBD() {
  localStorage.setItem('dbd_' + currentProjectId, JSON.stringify(dbdData));
  setSyncStatus('ok','Guardado');
}

function loadDBD() {
  const s = localStorage.getItem('dbd_' + currentProjectId);
  if (s) { try { dbdData = JSON.parse(s); return; } catch(e){} }
  dbdData = JSON.parse(JSON.stringify(DBD_BY_PROJECT[currentProjectId]?.dbd || []));
}

// ── MODAL ──
function openModal(type) {
  if (type === 'proyecto') document.getElementById('modalProyecto').classList.add('open');
  if (type === 'pieza') document.getElementById('piezaModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'modalProyecto') {
    ['f-cliente','f-director','f-nombre','f-rodaje','f-entrega'].forEach(k => { const el=document.getElementById(k); if(el) el.value=''; });
  }
  if (id === 'piezaModal') {
    ['p-nombre','p-dur','p-fecha','p-guion'].forEach(k => { const el=document.getElementById(k); if(el) el.value=''; });
  }
}

function closeModalOutside(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

function saveProject() {
  const cliente = document.getElementById('f-cliente').value.trim();
  if (!cliente) { alert('Ingresá el nombre del cliente'); return; }
  const fmt = d => { if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'}); };
  projects.push({
    id: Date.now(),
    cliente,
    director: document.getElementById('f-director').value.trim(),
    nombre: document.getElementById('f-nombre').value.trim(),
    rodaje: fmt(document.getElementById('f-rodaje').value),
    entrega: fmt(document.getElementById('f-entrega').value),
    estado: document.getElementById('f-estado').value,
    piezas: []
  });
  closeModal('modalProyecto');
  saveProjects();
  renderBoard();
}

function savePieza() {
  const nombre = document.getElementById('p-nombre').value.trim();
  if (!nombre) { alert('Ingresá el nombre de la pieza'); return; }
  const p = getCurrentProject(); if (!p) return;
  const newPieza = {
    id: Date.now(),
    nombre,
    dur: document.getElementById('p-dur').value.trim() || '—',
    fecha: document.getElementById('p-fecha').value.trim() || '',
    guion: document.getElementById('p-guion').value.trim() || ''
  };
  p.piezas.push(newPieza);
  getPiezaData(p.id, newPieza.id).guion = newPieza.guion;
  document.getElementById('d-piezas').textContent = p.piezas.length;
  closeModal('piezaModal');
  saveProjects();
  renderPiezas(p);
  renderOffline(p);
  renderOnline(p);
}

// ── SYNC STATUS ──
function setSyncStatus(status, text) {
  const bar = document.getElementById('syncBar');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  bar.style.display = 'flex';
  dot.className = 'sync-dot' + (status==='syncing'?' syncing':status==='error'?' error':'');
  txt.textContent = text;
  if (status==='ok') setTimeout(()=>{ bar.style.display='none'; }, 2000);
}

// ── NAV ──
function showBoard() { showView('boardView'); renderBoard(); }
function showView(id) { document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

// ── PERSISTENCE: PROJECTS ──
function saveProjects() {
  localStorage.setItem('projects_v1', JSON.stringify(projects));
}

function loadProjects() {
  const s = localStorage.getItem('projects_v1');
  if (s) { try { projects = JSON.parse(s); } catch(e){} }
}

// ── PERSISTENCE: PIEZA DATA ──
function savePiezaData() {
  localStorage.setItem('piezaData_v1', JSON.stringify(piezaData));
}

function loadPiezaData() {
  const s = localStorage.getItem('piezaData_v1');
  if (s) { try { piezaData = JSON.parse(s); } catch(e){} }
}

// ── INIT ──
loadProjects();
loadPiezaData();
renderBoard();
</script>
</body>
</html>
